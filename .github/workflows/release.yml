name: Release

# Triggered by pushing a tag of the form ``vX.Y.Z`` (matching the
# version bump produced by ``tools/bump_version.py``). Builds Windows
# redistributables IN PARALLEL on x64 (windows-latest) and ARM64
# (windows-11-arm — public-repo GA since 2025-08), then a single
# publish job collects both zips and uploads them to a GitHub Release.
#
# Manual ``workflow_dispatch`` runs are also supported so a
# maintainer can produce one-off cross-arch builds from the current
# main branch without cutting a tag.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Also publish to GitHub Releases (default: false for manual runs)"
        required: false
        default: "false"

permissions:
  contents: write  # required by softprops/action-gh-release

jobs:
  build-windows:
    name: Build Windows ${{ matrix.arch }} redistributable
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      # One arch failing must NOT cancel the other — a transient
      # ARM64 runner blip shouldn't cost us the x64 zip and force a
      # full re-run.
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            arch: x64
          - runner: windows-11-arm
            arch: arm64
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # tools/build_exe.ps1 reads `git rev-parse`

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # The runner image's preinstalled Python is x64 on
          # windows-latest and ARM64 on windows-11-arm; setup-python
          # follows the same convention so both matrix legs run
          # against their native arch. PyInstaller embeds the
          # interpreter's architecture into the produced .exe.

      - name: Cache pip
        uses: actions/cache@v5
        with:
          # Arch-distinct cache key so x64 and ARM64 don't fight
          # over the same key (different wheel archs cached).
          path: ~/AppData/Local/pip/Cache
          key: pip-${{ runner.os }}-${{ matrix.arch }}-py312-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.arch }}-py312-

      # Smoke gate runs BEFORE PyInstaller. PyInstaller takes ~8 minutes
      # on the windows-latest runner; failing fast here saves the time
      # (and the wasted GitHub Actions minutes) when the source tree is
      # broken. This mirrors the dev iteration order: smoke-then-build.
      - name: Install dev + schwab extras for smoke gate
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e ".[dev,schwab]"

      # IMPORTANT: unit tests + scanner tests must run with a CLEAN
      # environment (no TRADINGLAB_* env vars set). They use
      # ``monkeypatch.setenv("TRADINGLAB_CACHE_DIR", str(tmp_path))``
      # to redirect to an isolated tmp_path, but ``paths._resolve_root``
      # gives ``TRADINGLAB_DATA_DIR`` precedence — so a workflow-level
      # ``TRADINGLAB_DATA_DIR`` would silently shadow the monkeypatch
      # and cause tests to see leftover state from other tests.
      # See ``tests/unit/conftest.py`` for the defense-in-depth.
      - name: Run unit + scanner tests (clean env)
        shell: pwsh
        run: |
          python -m pytest tests/unit tests/scanner -q

      # Smoke tests are allowed to use ``TRADINGLAB_CACHE_DIR``
      # (already set by ``tests/smoke/conftest.py`` to a fresh tempdir
      # at import time). We do NOT set ``TRADINGLAB_DATA_DIR`` here
      # because (a) the smoke conftest's own setup is sufficient and
      # (b) it would override the smoke conftest's path resolution,
      # making ``check_b65_events_cache_disk_roundtrip`` look for
      # bundle files in the wrong place.
      #
      # ``TRADINGLAB_PYTEST_TIMEOUT_SCALE=5.0`` scales every
      # ``_pump`` / ``_pump_until`` call in the smoke harness so async
      # fetch + Tk event-loop races have time to settle on the
      # ``windows-latest`` runner (consistently ~2-5x slower than
      # local dev). See ``tests/smoke/_helpers.py:_timeout_scale``.
      - name: Run smoke tests
        shell: pwsh
        env:
          TRADINGLAB_PYTEST_TIMEOUT_SCALE: "5.0"
        run: |
          python -m pytest tests/smoke -q

      - name: Build redistributable
        shell: pwsh
        # ``-NoSmoke`` because the next step runs the richer probe
        # (GUI window + WM_CLOSE) that build_exe.ps1's bundled
        # ``--version`` check can't cover. ``build_exe.ps1`` auto-
        # detects the produced exe's arch via the PE machine code and
        # tags the zip filename ``TradingLab-<ver>-{win64|winarm64}.zip``
        # — no per-matrix-leg flag needed.
        run: ./tools/build_exe.ps1 -NoSmoke

      - name: Verify frozen build (--version only)
        shell: pwsh
        # Probe 1 (``--version``) is the meaningful gate: it catches
        # PyInstaller's most common failures (missing hidden import,
        # missing data file, broken bootloader). Probe 2 (full GUI
        # launch + WM_CLOSE) flakes on the ``windows-latest`` runner
        # because the session desktop's WM lifecycle is unreliable
        # for headless WM_CLOSE handling — the GUI process can fail
        # to receive the message even when locally a real user session
        # closes the same .exe in <1s. Verified locally on ARM64; the
        # CI gate is intentionally Probe-1-only. Audit
        # ``ci-skipgui``.
        run: ./tools/verify_frozen.ps1 -SkipGui

      - name: Inspect output
        shell: pwsh
        run: |
          Get-ChildItem dist | Format-Table Name, Length, LastWriteTime

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          # Matrix-arch-distinct name so x64 + ARM64 uploads don't
          # collide — the publish job downloads both via a glob.
          name: TradingLab-windows-${{ matrix.arch }}
          path: dist/TradingLab-*.zip
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to GitHub Releases
    needs: build-windows
    # Only publish when a tag is pushed or the user explicitly
    # opts in via workflow_dispatch. Manual dispatch defaults to
    # build-only so a maintainer can sanity-check a candidate
    # cross-arch build without creating a Release.
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download all arch artifacts
        uses: actions/download-artifact@v8
        with:
          # Pattern matches BOTH ``TradingLab-windows-x64`` AND
          # ``TradingLab-windows-arm64`` (one per matrix leg).
          # ``merge-multiple: true`` flattens all matching artifacts
          # into the single ``dist/`` directory so the action below
          # can pick up both zips with a single glob.
          pattern: TradingLab-windows-*
          merge-multiple: true
          path: dist/

      - name: List collected artifacts
        run: ls -lh dist/

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          files: dist/TradingLab-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
