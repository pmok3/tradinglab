name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: ruff check src tests

  unit:
    # The release workflow (.github/workflows/release.yml) runs
    # ``pytest tests/unit`` as a gate BEFORE building the redistributable,
    # but CI historically did NOT — so a broken unit test sailed through a
    # green CI and only surfaced when the ``vX.Y.Z`` tag was pushed, failing
    # the Release run at "Run unit tests (clean env)" (v0.4.0 / v0.3.11 /
    # v0.3.8 all hit this). Running the unit suite here closes that gap so
    # unit breakage is caught on the merge that introduces it.
    #
    # Scoped to {ubuntu, windows} — the two platform families the release
    # gate cares about (the release builds + unit-tests on Windows x64 +
    # ARM64; ubuntu adds cheap, fast coverage). macOS is intentionally
    # excluded: the release never runs unit on macOS, and headless
    # ``macos-latest`` deadlocks on Tk ``transient()`` modals (CLAUDE.md
    # §7.1) which the unit/gui dialog tests are not all guarded against.
    #
    # ``tests/unit`` runs as its OWN pytest invocation (not merged with
    # smoke/scanner) to mirror the release workflow's isolation — mixing
    # them in one process hit a Tcl_AsyncDelete teardown crash on CI
    # runners (see release.yml). The env is otherwise clean (no
    # TRADINGLAB_* vars) so the per-test ``tmp_path`` redirection isn't
    # shadowed (release.yml documents the same constraint).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk xvfb
      - run: pip install -e .[dev]
      - name: Run unit tests
        if: runner.os != 'Linux'
        run: pytest tests/unit -q
      - name: Run unit tests (Linux, under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest tests/unit -q

  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    # Hard ceiling: a hung Tk / future-poll loop on macOS-latest previously
    # left jobs `in_progress` for the runner's 6-hour default. 30 minutes
    # is well above the ~10 min real wall-clock for the suite locally.
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk xvfb
      - run: pip install -e .[dev]
      - name: Run smoke + scanner tests
        if: runner.os != 'Linux'
        run: pytest tests/smoke tests/scanner -v --tb=short
      - name: Run smoke + scanner tests (Linux, under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest tests/smoke tests/scanner -v --tb=short

  perf-gate:
    # Indicator perf-budget regression gate (see docs/PERFORMANCE.md +
    # CLAUDE.md §7.27). Opt-in marker so the default smoke matrix
    # stays fast; runs unconditionally on push to main so any
    # accidentally-merged regression surfaces immediately, and on
    # every PR — the suite is <1 second so the cost is negligible.
    # Budgets are sized at 4× the v0.3.0 ARM64 baseline so the gate
    # tolerates the Linux x86 runner's different micro-architecture.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - name: Run indicator perf-budget gates
        run: pytest tests/perf -m perf -v --tb=short
