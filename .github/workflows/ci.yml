name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: ruff check src tests

  unit:
    # The release workflow (.github/workflows/release.yml) runs
    # ``pytest tests/unit`` on Windows (x64 + ARM64) as a gate BEFORE
    # building the redistributable, but CI historically did NOT — only
    # lint + the smoke/scanner matrix + perf-gate. So a broken unit test
    # sailed through a green CI and only surfaced when the ``vX.Y.Z`` tag
    # was pushed, failing the Release at "Run unit tests (clean env)"
    # (v0.4.0 / v0.3.11 / v0.3.8 all hit this, each needing a follow-up
    # fix push). Running the unit suite here closes that gap so unit
    # breakage is caught on the merge that introduces it.
    #
    # Windows-only, mirroring the release's unit gate exactly. The suite
    # contains GUI-geometry tests (auto-stack ConditionFrame
    # classification, field-picker pixel widths, modal footer layout —
    # CLAUDE.md §7.19) whose assertions are CALIBRATED for Windows
    # font/widget metrics; under a headless Linux xvfb display they read
    # different pixel sizes and produce false failures, and the release
    # never unit-tests on Linux/macOS anyway. Runs as its OWN pytest
    # invocation to mirror the release's isolation. Env is otherwise clean
    # (no TRADINGLAB_* vars) so the per-test ``tmp_path`` redirection isn't
    # shadowed (release.yml documents the same constraint).
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e .[dev]
      - name: Run unit tests
        run: pytest tests/unit -q

  coverage:
    # Informational coverage report — NOT a gate. Runs the deterministic,
    # offline unit + scanner suites on Windows/3.12 (the same platform the
    # release unit-gates on, so the pixel-calibrated GUI-geometry tests
    # read true), prints a term-missing summary, and uploads coverage.xml
    # as an artifact. ``continue-on-error`` keeps it purely informational:
    # the ``unit`` job stays the real gate, and there is intentionally no
    # ``--cov-fail-under`` threshold (see pyproject ``[tool.coverage]``).
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true
    env:
      MPLBACKEND: Agg
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - name: Run tests with coverage
        run: pytest tests/unit tests/scanner --cov=tradinglab --cov-report=xml --cov-report=term-missing:skip-covered -q
      - name: Upload coverage.xml artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    # Hard ceiling: a hung Tk / future-poll loop on macOS-latest previously
    # left jobs `in_progress` for the runner's 6-hour default. 30 minutes
    # is well above the ~10 min real wall-clock for the suite locally.
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk xvfb
      - run: pip install -e .[dev]
      - name: Run smoke + scanner tests
        if: runner.os != 'Linux'
        run: pytest tests/smoke tests/scanner -v --tb=short
      - name: Run smoke + scanner tests (Linux, under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest tests/smoke tests/scanner -v --tb=short

  perf-gate:
    # Indicator perf-budget regression gate (see docs/PERFORMANCE.md +
    # CLAUDE.md §7.27). Opt-in marker so the default smoke matrix
    # stays fast; runs unconditionally on push to main so any
    # accidentally-merged regression surfaces immediately, and on
    # every PR — the suite is <1 second so the cost is negligible.
    # Budgets are sized at 4× the v0.3.0 ARM64 baseline so the gate
    # tolerates the Linux x86 runner's different micro-architecture.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - name: Run indicator perf-budget gates
        run: pytest tests/perf -m perf -v --tb=short
