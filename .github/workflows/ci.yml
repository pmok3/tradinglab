name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: ruff check src tests

  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    # Hard ceiling: a hung Tk / future-poll loop on macOS-latest previously
    # left jobs `in_progress` for the runner's 6-hour default. 30 minutes
    # is well above the ~10 min real wall-clock for the suite locally.
    timeout-minutes: 30
    env:
      MPLBACKEND: Agg
      PYTHONIOENCODING: utf-8
    steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk xvfb
      - run: pip install -e .[dev]
      - name: Run smoke + scanner tests
        if: runner.os != 'Linux'
        run: pytest tests/smoke tests/scanner -v --tb=short
      - name: Run smoke + scanner tests (Linux, under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest tests/smoke tests/scanner -v --tb=short
